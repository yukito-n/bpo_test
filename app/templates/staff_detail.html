<!DOCTYPE html>
<html>
<head>
    <title>Staff Detail</title>
</head>
<body>
    <h1>{{ staff.name }}</h1>
    <h2>Shifts</h2>
    <ul>
        {% for shift in shifts %}
            <li>{{ shift.start_time }} - {{ shift.end_time }}</li>
        {% endfor %}
    </ul>
    <a href="/">Back to dashboard</a>
</body>
</html>
